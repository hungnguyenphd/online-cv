career-profile:
  title: Career Profile
  summary: |
    I received my Bachelor’s degree in Thermal Engineering from Ho Chi Minh City University of Technology, Vietnam.
    Currently, I am a fifth-year PhD candidate in the Machine Learning & Fluid Mechanics Laboratory at Kyungpook National University, South Korea. My research focuses on the computational analysis of fluid dynamics and particle transport in the human respiratory system using OpenFOAM.
    My work investigates airflow behavior and aerosol transport mechanisms in the respiratory tract, with applications in respiratory health and inhalation therapies.
